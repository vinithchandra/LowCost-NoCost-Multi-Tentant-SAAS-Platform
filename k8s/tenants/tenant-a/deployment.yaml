apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: tenant-a
  labels:
    app: api-service
    tenant: tenant-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service
      tenant: tenant-a
  template:
    metadata:
      labels:
        app: api-service
        tenant: tenant-a
    spec:
      containers:
        - name: api
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: tenant-a
spec:
  selector:
    app: api-service
    tenant: tenant-a
  ports:
    - port: 80
      targetPort: 80
