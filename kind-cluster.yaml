kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: devops-platform
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 30000   # ArgoCD UI
        hostPort: 30000
      - containerPort: 30001   # Grafana UI
        hostPort: 30001
      - containerPort: 30002   # n8n UI
        hostPort: 30002
      - containerPort: 30003   # Chaos Mesh dashboard
        hostPort: 30003
  - role: worker
  - role: worker
